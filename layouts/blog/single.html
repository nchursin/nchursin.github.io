{{ define "main" }}
{{ partial "breadcrumbs" . }}
<section class="resume-section p-3 p-lg-5 d-flex flex-column">
  <div class="my-auto">
    <article>
      <header class="mb-3 d-flex flex-row justify-content-between">
        <h2 class="mb-0"><span class="text-primary">{{ .Title }}</span></h2>
        <time datetime="{{ .Date.Format "2006-01-02" }}" class="">{{ .Date.Format "January 2, 2006" }}</time>
      </header>
      <div>
        {{ .Content }}
        {{ with .Params.link }}
          <p>Ссылка на проект: <a href="{{ . }}">{{ . }}</a></p>{{ end }}
      </div>
      <div>
        {{ with $.Page.Resources.GetMatch "gpx" }}
          <a href="{{ .Permalink }}" title="Click to download gpx file">GPX file</a>
        {{ end }}
      </div>
      {{ partial "advtags" . }}
    </article>
  </div>
</section>
{{ end }}
